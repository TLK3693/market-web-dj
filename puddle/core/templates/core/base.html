<!doctype html>

<html>

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <script src = "https://cdn.tailwindcss.com"></script>

        <title>{%block tittle%}{%endblock%}Славянка</title>
    </head>

    <body class="px-6 py-6 space-y-4">

        <nav class="px-6 py-6 flex justify-between items-center border-b border-gray-400">
            <a href="/" class=" shadow-md text-xl outline outline-offset-2 outline-2 font semibold rounded-tr-lg ">Славянка</a>

            <div class="space-x-6">
                <a href="#" class="text-lg font-semibold hover:text-gray-500">New items</a>
                <a href="#" class="text-lg font-semibold hover:text-gray-500 ">Browse</a>


                {% if request.user.is_authenticated %}
                    <a href="#" class="inline-flex items-center px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-bold rounded-md">Входящие</a>
                    <a href="#" class="inline-flex items-center px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-bold rounded-md">Dashboard</a>
            
                {% else %}
                    <a href="{% url 'core:signup' %}" class="inline-flex items-center px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-bold rounded-md">Зарегестрироваться</a>
                    <a href="{% url 'core:login' %}" class="inline-flex items-center px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-bold rounded-md">Авторизоваться</a>
                {% endif %}        
            </div>
        </nav>


        <div class="space-y-4 "> 
            {% block content %}
            {% endblock %} 
        </div>

        <footer class="py-6 px-6 flex justify-between bg-[#525252] rounded-md">
            <div class="w-2/3 pr-10">
                <h3 class="mb-5 font-semibold text-gray-400">О нас</h3>
                <p class="text-lg text-gray-500">Магазин</p>
            </div>

            <div class="w-1/3">
                <h3 class="mb-5 font-semibold text-gray-400">Меню</h3>

                <ul class="space-y-2">
                    <li><a href="#" class="text-lg text-teal-500 hover:text-teal-700">О нас</a></li>
                    <li><a href="{% url 'core:contact'%}" class="text-lg text-teal-500 hover:text-teal-700">Контакты</a></li>
                    <li><a href="#" class="text-lg text-teal-500 hover:text-teal-700">Privacy policy</a></li>
                    <li><a href="#" class="text-lg text-teal-500 hover:text-teal-700">Terms of use</a></li>
                </ul>
            </div>
        </footer>

    </body>
</html>
